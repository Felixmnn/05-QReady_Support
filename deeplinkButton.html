<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>QReady Deeplink Redirect</title>

  <script>
    window.onload = function () {
      const appleStoreUrl = "https://apps.apple.com/us/app/qready/id6747379667";
      
      // Direkt zum Apple App Store weiterleiten
      window.location.href = appleStoreUrl;
    };
  </script>

  <style>
    :root {
      --bg: #f7f8fb;
      --card: linear-gradient(160deg, #0b2d66, #0a1f47);
      --muted: #c6d6ff;
      --text: #eef4ff;
      --brand: #95aaff;
      --radius: 14px;
      --shadow: 0 20px 45px rgba(0,0,0,.35);
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #95aaff, #0b7cb5);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
    }

    h1 {
      color: var(--brand);
      margin-bottom: 18px;
      text-align: center;
    }

    p {
      color: var(--text);
      text-align: center;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 30px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(197,215,255,.2);
      margin-top: 40px;
      text-align: center;
    }

    button {
      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #95aaff, #0b7cb5);
      color: #eef4ff;
      cursor: pointer;
      margin-top: 20px;
    }

    button:hover {
      filter: brightness(1.08);
    }

    .fallback {
      display: none;
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(229, 231, 235, 0.2);
    }

    .stores {
      display: grid;
      grid-template-columns: repeat(2, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 14px;
    }

    .store-card {
      background: linear-gradient(160deg, #123a7c, #0d2757);
      border-radius: 10px;
      border: 1px solid rgba(197,215,255,.2);
      padding: 14px;
      text-align: center;
    }

    .store-card img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
    }

    .store-card a {
      color: #d7e4ff;
      text-decoration: none;
      font-weight: 600;
    }

    .store-card a:hover {
      text-decoration: underline;
    }

    @media (max-width: 620px) {
      .stores {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand"><h2>QReady</h2></div>
    </header>

    <section class="card">
      <h1>Weiterleitung läuft …</h1>
      <p>Falls die automatische Weiterleitung nicht funktioniert hat:</p>
      <button id="manualRedirectBtn">Manuell öffnen</button>

      <div id="fallbackSection" class="fallback">
        <p>Falls die App nicht installiert ist, öffne den passenden Store:</p>
        <div class="stores">
          <div class="store-card">
            <img src="./appleStore.png" alt="Apple App Store" />
            <a id="appleStoreLink" href="https://apps.apple.com" target="_blank" rel="noopener noreferrer">Zum Apple App Store</a>
          </div>
          <div class="store-card">
            <img src="./googleStore.png" alt="Google Play Store" />
            <a id="googleStoreLink" href="https://play.google.com/store" target="_blank" rel="noopener noreferrer">Zum Google Play Store</a>
          </div>
        </div>
      </div>
    </section>
  </div>
</body>
</html>
