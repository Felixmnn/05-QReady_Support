<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="/favicon.png">
  <title>Datenlöschung – Akibo</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --card: linear-gradient(160deg, #0b2d66, #0a1f47);
      --muted: #c6d6ff;
      --text: #eef4ff;
      --brand: #95aaff;
      --radius: 14px;
      --shadow: 0 20px 45px rgba(0,0,0,.35);
    }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: linear-gradient(135deg, #95aaff, #0b7cb5);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap { max-width: 920px; margin: 0 auto; padding: 24px; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 18px 0 8px;
      position: sticky;
      top: 0;
      backdrop-filter: blur(8px);
    }
    .left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .left img { height: 34px; width: 34px; border-radius: 8px; }
    .left h1 { margin: 0; font-size: 20px; }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn {
      display: inline-block;
      border-radius: 12px;
      padding: 9px 12px;
      text-decoration: none;
      border: 1px solid rgba(197,215,255,.28);
      color: var(--text);
    }
    .btn:hover { background: rgba(198,214,255,.16); }
    h2 { margin-top: 1.8rem; color: var(--brand); }
    p, ul { color: var(--text); }
    .card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 18px; border: 1px solid rgba(197,215,255,.2); }
    footer { margin-top: 3rem; font-size: 0.9rem; color: var(--muted); text-align: center; }
    .kbd {
      background: rgba(12,31,68,.6);
      border: 1px solid rgba(197,215,255,.28);
      border-bottom-width: 2px;
      padding: 2px 6px;
      border-radius: 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 13px;
    }
    a { color: #d7e4ff; text-decoration: none; }
    a:hover { color: #ffffff; text-decoration: underline; }

    @media (max-width: 720px) {
      header { flex-wrap: wrap; }
      .top-actions { width: 100%; justify-content: flex-start; }
      .left h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="left">
        <img src="./akibo.png" alt="Akibo Logo" />
        <h1 id="page-title"></h1>
      </div>
      <div class="top-actions">
        <a class="btn" href="./index.html" id="backLink"></a>
      </div>
    </header>

    <section class="card">
      <h2 id="contact-title"></h2>
      <p id="contact-intro"></p>
      <div id="contact-content"></div>
      <p id="contact-app-info"></p>
    </section>

    <p id="date"></p>

    <section class="card">
      <h2 id="manual-title"></h2>
      <div id="manual-content"></div>
    </section>

    <section class="card">
      <h2 id="profile-title"></h2>
      <div id="profile-content"></div>
    </section>

    <section class="card">
      <h2 id="exceptions-title"></h2>
      <div id="exceptions-content"></div>
    </section>

    <footer id="footer"></footer>
  </div>

  <script>
    const texts = {
      de: {
        pageTitle: "Datenlöschung – Akibo",
        date: "Stand: Oktober 2025",
        manualTitle: "Welche Daten manuell gelöscht werden können",
        manualContent: `
          <ul>
            <li>Von Nutzer:innen erstellte Module und Fragen können einzeln gelöscht werden.</li>
            <li>Alle Fragen, die zu einem Modul gehören, werden beim Löschen des Moduls ebenfalls entfernt.</li>
          </ul>
        `,
        profileTitle: "Welche Daten beim Löschen des Profils gelöscht werden",
        profileContent: `
          <ul>
            <li>Alle vom Nutzer erstellten Module</li>
            <li>Alle Nutzungsdaten des Nutzers</li>
            <li>Alle In-App-Käufe wie z. B. Energie, Coins etc.</li>
          </ul>
          <p><strong>Wichtig:</strong> Der Prozess ist endgültig und kann nicht rückgängig gemacht werden.</p>
        `,
        exceptionsTitle: "Welche Daten nicht gelöscht werden",
        exceptionsContent: `
          <p>Sollte ein Nutzer eines seiner Module oder Fragen öffentlich gemacht haben und ein anderer Nutzer eine Kopie erstellt haben, so bleibt diese Kopie erhalten.</p>
          <p>Das gilt ebenfalls für kopierte Fragen. Möchte ein Nutzer diese entfernen, muss dies beim kopierten Modul erfolgen, da diese an die Kopie gebunden sind.</p>
        `,
        contactTitle: "Kontakt für Löschanfragen",
        contactIntro: "Wende dich für das Löschen deiner Daten an unseren Support unter:",
        contactAppInfo: "Oder lösche deine Daten direkt in der App unter: <span class='kbd'>Profil → Account löschen</span>.",
        contactContent: `
          E-Mail: <a href="mailto:akibo.app@gmail.com">akibo.app@gmail.com</a><br>
        `,
        back: "← Zurück zum Support",
        footer: "© 2025 Akibo – Alle Rechte vorbehalten."
      },
      en: {
        pageTitle: "Data Deletion – Akibo",
        date: "Effective: October 2025",
        manualTitle: "Data that can be manually deleted",
        manualContent: `
          <ul>
            <li>User-created modules and questions can be deleted individually.</li>
            <li>All questions belonging to a module are also deleted when the module itself is removed.</li>
          </ul>
        `,
        profileTitle: "Data deleted when the profile is removed",
        profileContent: `
          <ul>
            <li>All modules created by the user</li>
            <li>All user activity and usage data</li>
            <li>All in-app purchases such as energy, coins, etc.</li>
          </ul>
          <p><strong>Important:</strong> This process is permanent and cannot be undone.</p>
        `,
        exceptionsTitle: "Data that will not be deleted",
        exceptionsContent: `
          <p>If a user has made a module or question publicly available and another user has copied it, the copy will remain.</p>
          <p>This also applies to copied questions. To delete these, they must be removed from the copied module, as they are bound to it.</p>
        `,
        contactTitle: "Contact for deletion requests",
        contactIntro: "Contact our support for data deletion at:",
        contactAppInfo: "Or delete your data directly in the app under: <span class='kbd'>Profile → Delete Account</span>.",
        contactContent: `
          Email: <a href="mailto:akibo.app@gmail.com">akibo.app@gmail.com</a><br>
        `,
        back: "← Back to support",
        footer: "© 2025 Akibo – All rights reserved."
      }
    };

    let currentLang = 'en';

    function updateTexts() {
      const t = texts[currentLang];
      document.getElementById('page-title').textContent = t.pageTitle;
      document.getElementById('date').textContent = t.date;
      document.getElementById('manual-title').textContent = t.manualTitle;
      document.getElementById('manual-content').innerHTML = t.manualContent;
      document.getElementById('profile-title').textContent = t.profileTitle;
      document.getElementById('profile-content').innerHTML = t.profileContent;
      document.getElementById('exceptions-title').textContent = t.exceptionsTitle;
      document.getElementById('exceptions-content').innerHTML = t.exceptionsContent;
      document.getElementById('contact-title').textContent = t.contactTitle;
      document.getElementById('contact-intro').textContent = t.contactIntro;
      document.getElementById('contact-content').innerHTML = t.contactContent;
      document.getElementById('contact-app-info').innerHTML = t.contactAppInfo;
      document.getElementById('backLink').textContent = t.back;
      document.getElementById('footer').textContent = t.footer;
    }

    updateTexts();
  </script>
</body>
</html>
