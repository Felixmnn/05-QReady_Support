<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Akibo</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #95aaff, #0b7cb5);
      color: #eef4ff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(460px, 100%);
      background: linear-gradient(160deg, #0b2d66, #0a1f47);
      border-radius: 20px;
      padding: 36px 28px;
      text-align: center;
      box-shadow: 0 18px 36px rgba(18, 33, 58, 0.18);
      margin: 20px;
    }

    .app-logo {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      object-fit: contain;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0;
      color: #c6d6ff;
      font-size: 15px;
    }

    .actions {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      border-radius: 14px;
      padding: 15px;
      text-decoration: none;
      font-weight: 700;
      color: #fff;
      background: #111832;
      border: 1px solid rgba(197, 215, 255, 0.25);
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff7a00, #ffb347);
      color: #2f1900;
    }

    .store-icon {
      width: 28px;
      height: 28px;
      object-fit: contain;
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #dbe6ff;
    }

    .tiktok-hint {
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      font-size: 13px;
      color: #fff;
      display: none;
    }
  </style>
</head>

<body>
  <main class="card">
    <img class="app-logo" src="./akibo.png" alt="Akibo Logo" />

    <h1>Open Akibo</h1>
    <p id="subtitle">Open the app or download it from your store.</p>

    <div class="actions">
      <a id="openAppBtn" class="btn btn-primary" href="node-ready://">
        Open Akibo
      </a>

      <a id="iosStoreBtn" class="btn" href="https://apps.apple.com/app/id6747379667">
        <img class="store-icon" src="./appleStore.png" alt="" />
        Download on the App Store
      </a>

      <a id="androidStoreBtn" class="btn" href="https://play.google.com/store/apps/details?id=com.felix08.nodeready">
        <img class="store-icon" src="./googleStore.png" alt="" />
        Get it on Google Play
      </a>
    </div>

    <div id="tiktokHint" class="tiktok-hint">
      If the store does not open, tap the three dots ⋮ and choose “Open in browser”.
    </div>

    <p class="hint">You can also search for Akibo in the App Store or Google Play.</p>
  </main>

  <script>
    const IOS_STORE = "https://apps.apple.com/app/id6747379667";
    const ANDROID_STORE_WEB = "https://play.google.com/store/apps/details?id=com.felix08.nodeready";
    const ANDROID_STORE_APP = "market://details?id=com.felix08.nodeready";
    const DEEP_LINK = "node-ready://";

    const ua = navigator.userAgent || "";

    const isIOS =
      /iPad|iPhone|iPod/.test(ua) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    const isAndroid = /Android/i.test(ua);
    const isTikTok = /TikTok|Musical_ly|Bytedance/i.test(ua);

    const openAppBtn = document.getElementById("openAppBtn");
    const iosStoreBtn = document.getElementById("iosStoreBtn");
    const androidStoreBtn = document.getElementById("androidStoreBtn");
    const tiktokHint = document.getElementById("tiktokHint");

    if (isTikTok) {
      tiktokHint.style.display = "block";
    }

    if (isIOS) {
      androidStoreBtn.style.display = "none";
    }

    if (isAndroid) {
      iosStoreBtn.style.display = "none";

      androidStoreBtn.addEventListener("click", function (event) {
        event.preventDefault();

        window.location.href = ANDROID_STORE_APP;

        setTimeout(function () {
          if (!document.hidden) {
            window.location.href = ANDROID_STORE_WEB;
          }
        }, 1200);
      });
    }

    openAppBtn.addEventListener("click", function (event) {
      event.preventDefault();

      window.location.href = DEEP_LINK;

      setTimeout(function () {
        if (!document.hidden && !isTikTok) {
          if (isIOS) window.location.href = IOS_STORE;
          if (isAndroid) window.location.href = ANDROID_STORE_WEB;
        }
      }, 1400);
    });
  </script>
</body>
</html>
